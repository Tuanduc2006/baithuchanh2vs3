plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.baitapui'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.baitapui'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }
}

dependencies {
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    implementation 'androidx.cardview:cardview:1.0.0'
}
